{% extends "base.html" %}
{% block title %}Page Not Found — NexaBank{% endblock %}

{% block content %}
<div class="error-page d-flex align-items-center justify-content-center pt-navbar" data-scroll-section>
  <div class="container text-center py-5">
    <div class="error-icon mb-4">
      <i class="bi bi-exclamation-circle-fill text-primary" style="font-size: 5rem;"></i>
    </div>
    <h1 class="display-1 fw-bold text-muted">404</h1>
    <h2 class="h4 fw-semibold mb-3">Page Not Found</h2>
    <p class="text-muted mb-4">The page you are looking for does not exist or has been moved.</p>
    <a href="{{ url_for('auth.login') }}" class="btn btn-primary px-4">
      <i class="bi bi-house-fill me-2"></i>Go Home
    </a>
  </div>
</div>
{% endblock %}
