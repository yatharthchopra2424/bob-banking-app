{% extends "base.html" %}
{% block title %}Server Error — NexaBank{% endblock %}

{% block content %}
<div class="error-page d-flex align-items-center justify-content-center pt-navbar" data-scroll-section>
  <div class="container text-center py-5">
    <div class="error-icon mb-4">
      <i class="bi bi-tools text-warning" style="font-size: 5rem;"></i>
    </div>
    <h1 class="display-1 fw-bold text-muted">500</h1>
    <h2 class="h4 fw-semibold mb-3">Something Went Wrong</h2>
    <p class="text-muted mb-4">An unexpected error occurred. Please try again or return to the homepage.</p>
    <a href="{{ url_for('auth.login') }}" class="btn btn-primary px-4">
      <i class="bi bi-house-fill me-2"></i>Go Home
    </a>
  </div>
</div>
{% endblock %}
